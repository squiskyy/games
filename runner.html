<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            overflow: hidden;
            transition: background 0.3s;
        }
        #container {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        #ui {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            font-family: monospace;
        }
        canvas {
            border: 2px solid;
            image-rendering: pixelated;
            width: 100%;
            max-width: 100%;
            height: auto;
            transition: border-color 0.3s;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            text-shadow: 0 0 10px currentColor;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, color 0.3s;
            text-align: center;
            white-space: pre;
        }
        #message.show { opacity: 1; }
        #controls {
            margin-top: 8px;
            font-size: 11px;
            text-align: center;
            transition: color 0.3s;
        }
        
        /* Theme: Default (Grey) */
        body.default { background: #0a0a0a; }
        body.default #ui { color: #888; }
        body.default canvas { background: #111; border-color: #444; }
        body.default #message { color: #fff; }
        body.default #controls { color: #555; }
        
        /* Theme: Matrix */
        body.matrix { background: #000; }
        body.matrix #ui { color: #00aa00; }
        body.matrix canvas { background: #001100; border-color: #00aa00; }
        body.matrix #message { color: #00ff00; }
        body.matrix #controls { color: #006600; }
        
        /* Theme: Neon */
        body.neon { background: #0a0014; }
        body.neon #ui { color: #ff66b2; }
        body.neon canvas { background: #150020; border-color: #ff66b2; }
        body.neon #message { color: #ff66b2; text-shadow: 0 0 20px #ff66b2, 0 0 40px #ff66b2; }
        body.neon #controls { color: #9933ff; }
        
        /* Theme: Paper */
        body.paper { background: #f5f0e6; }
        body.paper #ui { color: #444; }
        body.paper canvas { background: #fffef8; border-color: #ccc; }
        body.paper #message { color: #222; text-shadow: none; }
        body.paper #controls { color: #888; }
    </style>
</head>
<body class="default">
    <div id="container">
        <div id="ui">
            <span id="score">SCORE: 0</span>
            <span id="hiscore">HI: 0</span>
        </div>
        <canvas id="game"></canvas>
        <div id="message">PRESS SPACE TO START</div>
        <div id="controls">SPACE/UP: Jump  DOWN: Fast Fall  P: Pause  T: Theme | Version 1.1</div>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const hiscoreEl = document.getElementById('hiscore');
        const messageEl = document.getElementById('message');
        
        const CELL_W = 12;
        const CELL_H = 20;
        const W = 50;
        const H = 18;
        const GROUND = H - 3;
        
        canvas.width = W * CELL_W;
        canvas.height = H * CELL_H;
        
        // Theme definitions
        const themes = {
            default: { bg: '#111', bright: '#fff', dim: '#444', ground: '#555', cloud: '#333' },
            matrix:  { bg: '#001100', bright: '#00ff00', dim: '#004400', ground: '#006600', cloud: '#002200' },
            neon:    { bg: '#150020', bright: '#ff66b2', dim: '#9933ff', ground: '#cc33ff', cloud: '#220033' },
            paper:   { bg: '#fffef8', bright: '#222', dim: '#888', ground: '#aaa', cloud: '#ddd' }
        };
        const themeNames = ['default', 'matrix', 'neon', 'paper'];
        let currentTheme = 0;
        
        function getTheme() { return themes[themeNames[currentTheme]]; }
        
        let game = {
            running: false,
            paused: false,
            score: 0,
            hiScore: parseInt(localStorage.getItem('ascii_hi') || '0'),
            speed: 0.5,
            frame: 0
        };
        
        let player = { x: 8, y: GROUND - 2, vy: 0, onGround: true, frame: 0, dead: false };
        let obstacles = [];
        let particles = [];
        let clouds = [];
        
        for (let i = 0; i < 3; i++) {
            clouds.push({ x: Math.random() * W, y: Math.floor(Math.random() * (H / 2)), w: 4 + Math.floor(Math.random() * 3), s: 0.02 + Math.random() * 0.02 });
        }
        
        const GRAVITY = 0.3;
        const JUMP = -6;
        const FAST_FALL = 2;
        
        const obstacleTypes = [
            { h: 2, chars: ["▓▓▓", "▓▓▓"] },
            { h: 2, chars: ["▲▲▲", "▲▲▲"] },
            { h: 1, chars: ["▒▒▒▒"] },
            { h: 3, chars: [" █ ", "███", "███"] }
        ];
        
        function spawnObstacle() {
            const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            obstacles.push({ x: W, y: GROUND - type.h, type: type, passed: false });
        }
        
        function spawnParticles(x, y, count, char) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * 1.5,
                    y: y + (Math.random() - 0.5),
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5 - 0.8,
                    life: 12 + Math.random() * 8,
                    char: char || '*'
                });
            }
        }
        
        function drawChar(x, y, char, color) {
            ctx.fillStyle = color;
            ctx.fillText(char, x * CELL_W, y * CELL_H + CELL_H - 2);
        }
        
        function update() {
            if (!game.running || game.paused) {
                render();
                requestAnimationFrame(update);
                return;
            }
            
            game.frame++;
            game.speed = 0.5 + Math.floor(game.score / 500) * 0.1;
            
            player.vy += GRAVITY;
            player.y += player.vy;
            
            if (player.y >= GROUND - 2) {
                player.y = GROUND - 2;
                player.vy = 0;
                player.onGround = true;
            } else {
                player.onGround = false;
            }
            
            player.frame++;
            
            const spawnRate = Math.max(35, 70 - Math.floor(game.score / 100) * 4);
            if (game.frame % Math.floor(spawnRate / game.speed) === 0) spawnObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= game.speed;
                
                if (!obs.passed && obs.x + 3 < player.x) {
                    obs.passed = true;
                    game.score += 100;
                    scoreEl.textContent = `SCORE: ${game.score}`;
                }
                
                if (obs.x < -5) obstacles.splice(i, 1);
                
                if (player.x + 2 > obs.x && player.x < obs.x + 3 && player.y + 2 > obs.y) {
                    die();
                }
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            clouds.forEach(c => {
                c.x -= c.s;
                if (c.x + c.w < 0) c.x = W;
            });
            
            render();
            requestAnimationFrame(update);
        }
        
        function die() {
            spawnParticles(player.x + 1, player.y + 1, 12, '*');
            player.dead = true;
            game.running = false;
            
            if (game.score > game.hiScore) {
                game.hiScore = game.score;
                localStorage.setItem('ascii_hi', game.hiScore);
                hiscoreEl.textContent = `HI: ${game.hiScore}`;
                showMessage("NEW HIGH SCORE!");
            } else {
                showMessage("GAME OVER\n\nSPACE TO RESTART");
            }
        }
        
        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.add('show');
        }
        
        function hideMessage() { messageEl.classList.remove('show'); }
        
        function render() {
            const t = getTheme();
            ctx.fillStyle = t.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = `${CELL_H - 2}px monospace`;
            ctx.textBaseline = 'bottom';
            
            // Clouds
            clouds.forEach(c => {
                if (c.y >= 0 && c.y < H) {
                    for (let i = 0; i < c.w; i++) {
                        let cx = Math.floor(c.x) + i;
                        if (cx >= 0 && cx < W) drawChar(cx, c.y, '≈', t.cloud);
                    }
                }
            });
            
            // Particles
            particles.forEach(p => {
                let px = Math.floor(p.x);
                let py = Math.floor(p.y);
                if (px >= 0 && px < W && py >= 0 && py < H) drawChar(px, py, p.char, t.bright);
            });
            
            // Obstacles
            obstacles.forEach(obs => {
                for (let oy = 0; oy < obs.type.h; oy++) {
                    let row = obs.type.chars[oy] || '';
                    for (let ox = 0; ox < row.length; ox++) {
                        let rx = Math.floor(obs.x) + ox;
                        if (rx >= 0 && rx < W) drawChar(rx, obs.y + oy, row[ox], t.bright);
                    }
                }
            });
            
            // Player
            if (!player.dead) {
                const sprites = {
                    idle: ["  O  ", " /|\\ ", " / \\ "],
                    run:  ["  O  ", "  |  ", " / \\ "],
                    jump:["  O  ", " /|\\ ", "   \\ "]
                };
                
                let sprite = sprites.idle;
                if (!player.onGround) sprite = sprites.jump;
                else if (Math.floor(player.frame / 6) % 2 === 0) sprite = sprites.run;
                
                for (let sy = 0; sy < 3; sy++) {
                    for (let sx = 0; sx < 5; sx++) {
                        let c = sprite[sy][sx];
                        if (c !== ' ') drawChar(Math.floor(player.x) + sx, Math.floor(player.y) + sy, c, t.bright);
                    }
                }
            }
            
            // Ground
            const groundChars = '═┄┅─';
            for (let x = 0; x < W; x++) {
                drawChar(x, GROUND, groundChars[Math.floor((x + game.frame * 0.2) % groundChars.length)], t.ground);
            }
        }
        
        function setTheme(index) {
            currentTheme = index;
            document.body.className = themeNames[index];
        }
        
        function reset() {
            player = { x: 8, y: GROUND - 2, vy: 0, onGround: true, frame: 0, dead: false };
            obstacles = [];
            particles = [];
            game.score = 0;
            game.speed = 0.5;
            game.frame = 0;
            scoreEl.textContent = 'SCORE: 0';
            hiscoreEl.textContent = `HI: ${game.hiScore}`;
            hideMessage();
        }
        
        function start() { reset(); game.running = true; game.paused = false; }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!game.running) start();
                else if (player.onGround) { player.vy = JUMP; player.onGround = false; spawnParticles(player.x, player.y + 2, 3, '.'); }
            }
            if (e.code === 'ArrowDown' && !player.onGround) player.vy += FAST_FALL;
            if (e.code === 'KeyP' && game.running) { game.paused = !game.paused; showMessage(game.paused ? "PAUSED" : ""); }
            if (e.code === 'KeyT') { currentTheme = (currentTheme + 1) % themeNames.length; setTheme(currentTheme); }
        });
        
        let touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; if (!game.running) start(); });
        document.addEventListener('touchend', e => {
            const dy = touchStartY - e.changedTouches[0].clientY;
            if (dy > 30 && player.onGround) { player.vy = JUMP; player.onGround = false; }
            else if (dy < -30 && !player.onGround) player.vy += FAST_FALL;
        });
        
        // Load saved theme
        const savedTheme = localStorage.getItem('runner_theme') || 'default';
        currentTheme = themeNames.indexOf(savedTheme);
        if (currentTheme < 0) currentTheme = 0;
        setTheme(currentTheme);
        
        hiscoreEl.textContent = `HI: ${game.hiScore}`;
        showMessage("PRESS SPACE TO START");
        update();
    </script>
</body>
</html>
