<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #container { position: relative; }
        #game {
            background: #111;
            border: 3px solid #444;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            line-height: 1;
            white-space: pre;
            color: #aaa;
            box-shadow: 0 0 30px rgba(100, 100, 100, 0.3);
        }
        #ui {
            position: absolute;
            top: -35px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px #fff;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            width: 100%;
        }
        #message.show { opacity: 1; }
        #controls {
            position: absolute;
            bottom: -30px;
            left: 0;
            right: 0;
            text-align: center;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui">
            <span id="score">SCORE: 0</span>
            <span id="hiscore">HI: 0</span>
        </div>
        <pre id="game"></pre>
        <div id="message">PRESS SPACE TO START</div>
        <div id="controls">SPACE/↑ Jump  ↓ Fast Fall  P Pause</div>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const scoreEl = document.getElementById('score');
        const hiscoreEl = document.getElementById('hiscore');
        const messageEl = document.getElementById('message');
        
        const W = 60;
        const H = 20;
        const GROUND = H - 3;
        
        let game = {
            running: false,
            paused: false,
            score: 0,
            hiScore: parseInt(localStorage.getItem('ascii_hi') || '0'),
            speed: 1,
            frame: 0,
            shake: 0
        };
        
        let player = {
            x: 8,
            y: GROUND - 2,
            vy: 0,
            onGround: true,
            frame: 0,
            dead: false
        };
        
        let obstacles = [];
        let particles = [];
        let clouds = [];
        
        for (let i = 0; i < 4; i++) {
            clouds.push({
                x: Math.random() * W,
                y: Math.floor(Math.random() * (H / 2)),
                w: 4 + Math.floor(Math.random() * 4),
                s: 0.02 + Math.random() * 0.03
            });
        }
        
        const GRAVITY = 0.5;
        const JUMP = -10;
        const FAST_FALL = 4;
        
        const obstacleTypes = [
            { h: 2, chars: ["▓▓▓", "▓▓▓"] },
            { h: 2, chars: ["▲▲▲", "▲▲▲"] },
            { h: 1, chars: ["▒▒▒▒▒"] },
            { h: 3, chars: [" █ ", "███", "███"] }
        ];
        
        function spawnObstacle() {
            const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            obstacles.push({
                x: W,
                y: GROUND - type.h,
                type: type,
                passed: false
            });
        }
        
        function spawnParticles(x, y, count, char = '*') {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * 2,
                    y: y + (Math.random() - 0.5),
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2 - 1,
                    life: 15 + Math.random() * 10,
                    char: char
                });
            }
        }
        
        function update() {
            if (!game.running || game.paused) {
                render();
                requestAnimationFrame(update);
                return;
            }
            
            game.frame++;
            game.speed = 1 + Math.floor(game.score / 500) * 0.2;
            if (game.shake > 0) game.shake--;
            
            player.vy += GRAVITY;
            player.y += player.vy;
            
            if (player.y >= GROUND - 2) {
                player.y = GROUND - 2;
                player.vy = 0;
                player.onGround = true;
            } else {
                player.onGround = false;
            }
            
            player.frame++;
            
            const spawnRate = Math.max(40, 80 - Math.floor(game.score / 100) * 5);
            if (game.frame % Math.floor(spawnRate / game.speed) === 0) {
                spawnObstacle();
            }
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= game.speed;
                
                if (!obs.passed && obs.x + 3 < player.x) {
                    obs.passed = true;
                    game.score += 100;
                    scoreEl.textContent = `SCORE: ${game.score}`;
                }
                
                if (obs.x < -5) obstacles.splice(i, 1);
                
                if (
                    player.x + 2 > obs.x &&
                    player.x < obs.x + 3 &&
                    player.y + 2 > obs.y
                ) {
                    die();
                }
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            clouds.forEach(c => {
                c.x -= c.s;
                if (c.x + c.w < 0) c.x = W;
            });
            
            render();
            requestAnimationFrame(update);
        }
        
        function die() {
            game.shake = 10;
            spawnParticles(player.x + 1, player.y + 1, 15, '*');
            player.dead = true;
            game.running = false;
            
            if (game.score > game.hiScore) {
                game.hiScore = game.score;
                localStorage.setItem('ascii_hi', game.hiScore);
                hiscoreEl.textContent = `HI: ${game.hiScore}`;
                showMessage("NEW HIGH SCORE!");
            } else {
                showMessage("GAME OVER - SPACE TO RESTART");
            }
        }
        
        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.add('show');
        }
        
        function hideMessage() {
            messageEl.classList.remove('show');
        }
        
        function render() {
            let grid = [];
            for (let y = 0; y < H; y++) {
                let row = [];
                for (let x = 0; x < W; x++) {
                    row.push({ char: ' ', style: '' });
                }
                grid.push(row);
            }
            
            // Clouds
            clouds.forEach(c => {
                if (c.y >= 0 && c.y < H) {
                    for (let i = 0; i < c.w; i++) {
                        let cx = Math.floor(c.x) + i;
                        if (cx >= 0 && cx < W) {
                            grid[c.y][cx] = { char: '≈', style: 'dim' };
                        }
                    }
                }
            });
            
            // Particles
            particles.forEach(p => {
                let px = Math.floor(p.x);
                let py = Math.floor(p.y);
                if (px >= 0 && px < W && py >= 0 && py < H) {
                    grid[py][px] = { char: p.char, style: 'bright' };
                }
            });
            
            // Obstacles
            obstacles.forEach(obs => {
                for (let oy = 0; oy < obs.type.h; oy++) {
                    let row = obs.type.chars[oy] || '';
                    for (let ox = 0; ox < row.length; ox++) {
                        let rx = Math.floor(obs.x) + ox;
                        if (rx >= 0 && rx < W) {
                            grid[obs.y + oy][rx] = { char: row[ox], style: 'bright' };
                        }
                    }
                }
            });
            
            // Player
            if (!player.dead) {
                const sprite = [
                    "  O  ",
                    " /|\\ ",
                    " / \\ "
                ];
                const runSprite = [
                    "  O  ",
                    "  |  ",
                    " / \\ "
                ];
                const jumpSprite = [
                    "  O  ",
                    " /|\\ ",
                    "   \\ "
                ];
                
                let useSprite = sprite;
                if (!player.onGround) useSprite = jumpSprite;
                else if (Math.floor(player.frame / 8) % 2 === 0) useSprite = runSprite;
                
                for (let sy = 0; sy < 3; sy++) {
                    for (let sx = 0; sx < 5; sx++) {
                        let px = Math.floor(player.x) + sx;
                        let py = Math.floor(player.y) + sy;
                        if (px >= 0 && px < W && py >= 0 && py < H) {
                            let c = useSprite[sy][sx];
                            if (c !== ' ') {
                                grid[py][px] = { char: c, style: 'bright' };
                            }
                        }
                    }
                }
            }
            
            // Ground
            const groundChars = '╌┄┅═─';
            for (let x = 0; x < W; x++) {
                grid[GROUND][x] = { 
                    char: groundChars[Math.floor((x + game.frame * 0.3) % groundChars.length)], 
                    style: 'dim' 
                };
            }
            
            // Build output
            let output = '';
            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    let cell = grid[y][x];
                    output += cell.char;
                }
                output += '\n';
            }
            
            canvas.textContent = output;
        }
        
        function reset() {
            player = { x: 8, y: GROUND - 2, vy: 0, onGround: true, frame: 0, dead: false };
            obstacles = [];
            particles = [];
            game.score = 0;
            game.speed = 1;
            game.frame = 0;
            game.shake = 0;
            scoreEl.textContent = 'SCORE: 0';
            hiscoreEl.textContent = `HI: ${game.hiScore}`;
            hideMessage();
        }
        
        function start() {
            reset();
            game.running = true;
            game.paused = false;
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!game.running) start();
                else if (player.onGround) {
                    player.vy = JUMP;
                    player.onGround = false;
                    spawnParticles(player.x, player.y + 2, 3, '.');
                }
            }
            if (e.code === 'ArrowDown' && !player.onGround) {
                player.vy += FAST_FALL;
            }
            if (e.code === 'KeyP' && game.running) {
                game.paused = !game.paused;
                showMessage(game.paused ? "PAUSED" : "");
            }
        });
        
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            if (!game.running) start();
        });
        document.addEventListener('touchend', (e) => {
            const dy = touchStartY - e.changedTouches[0].clientY;
            if (dy > 30 && player.onGround) {
                player.vy = JUMP;
                player.onGround = false;
            } else if (dy < -30 && !player.onGround) {
                player.vy += FAST_FALL;
            }
        });
        
        hiscoreEl.textContent = `HI: ${game.hiScore}`;
        showMessage("PRESS SPACE TO START");
        update();
    </script>
</body>
</html>
